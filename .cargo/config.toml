[build]
jobs = -1

# Linux x86_64: use default linker (works on any runner/box without setup).
# To enable the mold linker locally for faster link times, install mold
# (`sudo apt-get install mold`) and set in your shell profile:
#   export RUSTFLAGS="-C link-arg=-fuse-ld=mold $RUSTFLAGS"
# Or create `.cargo/config.toml.local` (gitignored) with the mold override.
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+avx2,+fma",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+avx2,+fma",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
    "-L", "/opt/homebrew/opt/flac/lib",
]

[env]
LIBRARY_PATH = "/opt/homebrew/opt/flac/lib"

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+avx2,+fma",
]
