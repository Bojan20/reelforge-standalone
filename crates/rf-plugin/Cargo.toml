[package]
name = "rf-plugin"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "ULTIMATE Plugin hosting for VST3/AU/CLAP/LV2/ARA2 formats"

[dependencies]
rf-core = { workspace = true }
rf-dsp = { workspace = true }

# Plugin hosting
vst3 = { workspace = true }
rack = "0.4"
dirs-next = { workspace = true }

# Core utilities
parking_lot = { workspace = true }
crossbeam-channel = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Parallel scanning (Phase 5.1)
rayon = { workspace = true }

# Dynamic library loading (CLAP + LV2 plugin hosting)
libloading = "0.8"

# Platform-specific
[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10"
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString", "NSGeometry"] }
objc2-app-kit = { version = "0.3", features = ["NSApplication", "NSWindow", "NSView", "NSResponder", "NSRunningApplication", "NSEvent"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = ["Win32_System_Com", "Win32_Foundation"] }

[build-dependencies]
cc = "1"

[features]
default = ["vst3", "clap", "lv2"]
vst3 = []
clap = []
lv2 = []
au = []
ara2 = []
