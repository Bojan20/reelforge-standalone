[package]
name = "rf-plugin-host"
version = "0.1.0"
edition = "2024"
description = "Standalone plugin GUI host helper process"

[[bin]]
name = "rf-plugin-host"
path = "src/main.rs"

[dependencies]
rack = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString", "NSGeometry"] }
objc2-app-kit = { version = "0.3", features = ["NSApplication", "NSWindow", "NSResponder", "NSRunningApplication"] }
block2 = "0.6"

[build-dependencies]
cc = "1"
