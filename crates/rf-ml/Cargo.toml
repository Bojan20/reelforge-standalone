[package]
name = "rf-ml"
version.workspace = true
edition.workspace = true
description = "FluxForge Studio ML/AI Processing Suite - Neural audio processing"
license.workspace = true

[dependencies]
# ONNX Runtime - disabled for now (versions yanked)
# ort = { version = "2.0.0-rc.9", optional = true }

# Pure Rust fallback (WASM compatible)
tract-onnx.workspace = true
tract-core.workspace = true

# Hugging Face Rust framework (optional, for custom models)
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }

# Audio processing
rustfft.workspace = true
realfft.workspace = true

# Numeric
ndarray.workspace = true
num-complex.workspace = true

# Parallel processing
rayon.workspace = true

# Async
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging
log.workspace = true
tracing.workspace = true

# Utilities
num_cpus.workspace = true

# Internal crates
rf-core.workspace = true
rf-dsp.workspace = true

[features]
default = []
# ort-runtime = ["ort"]
candle = ["candle-core", "candle-nn"]

[dev-dependencies]
criterion.workspace = true
approx.workspace = true

# [[bench]]
# name = "ml_benchmarks"
# harness = false
