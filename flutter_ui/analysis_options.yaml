# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Migrated 2026-05-07: `Color.withOpacity` → `.withValues(alpha:)` (2395 sites, 162 files).
    # Remaining deprecations (~191 info) are all type-receiver-sensitive — they
    # CANNOT be safely auto-migrated without a Dart-level type checker because the
    # same identifier (`value`, `activeColor`, `groupValue`, `onChanged`) appears
    # on both deprecated-Color/Switch APIs and on still-valid widgets/providers.
    # Categories pending manual migration:
    #   • 94× `Color.value` → `.toARGB32()` (must distinguish from Slider/Notifier.value)
    #   • 47× `Switch.activeColor` → `thumbColor: WidgetStateProperty.all(...)` (API redesign)
    #   • 14× `Color.red/green/blue` → `(c.r * 255.0).round()...` (precision-sensitive)
    #   •  7× `Radio.groupValue/onChanged` → `RadioGroup.onChanged`
    #   •  2× `RawKeyboardListener/RawKeyDownEvent` → `KeyboardListener/KeyDownEvent`
    # Until these are cleaned, lint is suppressed to keep `flutter analyze` clean
    # for CI gating (P0 1.6.3).
    deprecated_member_use: ignore
    # Suppress dangling library doc comments (file headers with ///)
    dangling_library_doc_comments: ignore
    # Suppress unnecessary import warnings
    unnecessary_import: ignore
    # Suppress unnecessary late warnings (generated code)
    unnecessary_late: ignore
    # Suppress avoid_types_as_parameter_names
    avoid_types_as_parameter_names: ignore
    # Suppress unused field/element/parameter warnings
    unused_field: ignore
    unused_element: ignore
    unused_element_parameter: ignore
    unused_local_variable: ignore
    # Suppress unnecessary string interpolation
    unnecessary_string_interpolations: ignore

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    avoid_print: false
    prefer_final_fields: false
    curly_braces_in_flow_control_structures: false
    unnecessary_brace_in_string_interps: false
    use_build_context_synchronously: false
    sort_child_properties_last: false
    no_leading_underscores_for_local_identifiers: false
    unnecessary_this: false
    prefer_initializing_formals: false
    use_super_parameters: false
    sized_box_for_whitespace: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
